<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — SwiftGlobal Logistics</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-login-body">

    <div class="login-wrapper">
      <div class="login-logo">
        <span class="login-logo-text">Swift<span>Global</span></span>
        <span class="login-logo-badge">Admin</span>
      </div>

      <div class="login-card">
        <div class="login-card-header">
          <div class="login-icon"><i class="fa fa-shield-halved"></i></div>
          <h1>Admin Login</h1>
          <p>Sign in with your Firebase admin credentials</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="admin-form-group">
            <label for="adminEmail"><i class="fa fa-envelope"></i> Email</label>
            <input type="email" id="adminEmail" placeholder="admin@swiftglobalogistics.com"
              autocomplete="email" required />
          </div>

          <div class="admin-form-group">
            <label for="adminPass"><i class="fa fa-lock"></i> Password</label>
            <div class="pass-wrap">
              <input type="password" id="adminPass" placeholder="Enter password"
                autocomplete="current-password" required />
              <button type="button" class="pass-toggle" id="passToggle" aria-label="Toggle password">
                <i class="fa fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="login-error" id="loginError" style="display:none;">
            <i class="fa fa-triangle-exclamation"></i>
            <span id="loginErrorMsg">Invalid credentials. Please try again.</span>
          </div>

          <button type="submit" class="admin-btn admin-btn-primary login-btn" id="loginBtn">
            <i class="fa fa-right-to-bracket"></i> Login to Admin Panel
          </button>
        </form>
      </div>

      <p class="login-footer-note">
        <i class="fa fa-lock"></i> Secured by Firebase Auth — SwiftGlobal Logistics
        &copy; <span id="year"></span>
      </p>
    </div>

    <script type="module">
  import { adminLogin, onAuthReady } from './firebase.js';

  onAuthReady(user => {
    if (user) window.location.href = 'dashboard.html';
  });

  document.getElementById('year')?.textContent && (
    document.getElementById('year').textContent = new Date().getFullYear()
  );

  /* Password toggle — find the button regardless of ID */
  document.querySelector('.pass-toggle')?.addEventListener('click', function() {
    const inp = document.querySelector('#loginForm input[type="password"], #loginForm input[type="text"]');
    if (!inp) return;
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    const ico = this.querySelector('i');
    if (ico) ico.className = inp.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
  });

  /* Login form submit */
  document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();

    /* Grab inputs by name or position — never by assumed ID */
    const emailInput = this.querySelector('input[type="email"], input[autocomplete="email"], input[autocomplete="username"]');
    const passInput  = this.querySelector('input[type="password"], input[type="text"][id*="pass"], input[id*="Pass"]');
    const errorBox   = document.getElementById('loginError');
    const errorMsg   = document.getElementById('loginErrorMsg');
    const btn        = document.getElementById('loginBtn');

    if (!emailInput || !passInput) {
      console.error('Login inputs not found. Check your HTML input IDs.');
      return;
    }

    const email    = emailInput.value.trim();
    const password = passInput.value.trim();

    if (!email || !password) {
      if (errorBox) errorBox.style.display = 'flex';
      if (errorMsg) errorMsg.textContent   = 'Please enter your email and password.';
      return;
    }

    if (btn) {
      btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Verifying...';
      btn.disabled  = true;
    }

    if (errorBox) errorBox.style.display = 'none';

    try {
      await adminLogin(email, password);
      window.location.href = 'dashboard.html';
    } catch (err) {
      console.error('Login error:', err.code, err.message);

      if (errorBox) errorBox.style.display = 'flex';
      if (errorMsg) {
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' ||
            err.code === 'auth/invalid-credential') {
          errorMsg.textContent = 'Invalid email or password. Please try again.';
        } else if (err.code === 'auth/too-many-requests') {
          errorMsg.textContent = 'Too many failed attempts. Please wait a few minutes.';
        } else if (err.code === 'auth/network-request-failed') {
          errorMsg.textContent = 'Network error. Check your internet connection.';
        } else {
          errorMsg.textContent = `Login failed: ${err.message}`;
        }
      }

      if (btn) {
        btn.innerHTML = '<i class="fa fa-right-to-bracket"></i> Login to Admin Panel';
        btn.disabled  = false;
      }

      passInput.value = '';
      passInput.focus();
    }
  });
</script>
  </body>
</html>
