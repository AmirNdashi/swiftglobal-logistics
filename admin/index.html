<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — SwiftGlobal Logistics</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-login-body">

    <div class="login-wrapper">
      <div class="login-logo">
        <span class="login-logo-text">Swift<span>Global</span></span>
        <span class="login-logo-badge">Admin</span>
      </div>

      <div class="login-card">
        <div class="login-card-header">
          <div class="login-icon"><i class="fa fa-shield-halved"></i></div>
          <h1>Admin Login</h1>
          <p>Sign in with your Firebase admin credentials</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="admin-form-group">
            <label for="adminEmail"><i class="fa fa-envelope"></i> Email</label>
            <input type="email" id="adminEmail" placeholder="admin@swiftglobalogistics.com"
              autocomplete="email" required />
          </div>

          <div class="admin-form-group">
            <label for="adminPass"><i class="fa fa-lock"></i> Password</label>
            <div class="pass-wrap">
              <input type="password" id="adminPass" placeholder="Enter password"
                autocomplete="current-password" required />
              <button type="button" class="pass-toggle" id="passToggle" aria-label="Toggle password">
                <i class="fa fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="login-error" id="loginError" style="display:none;">
            <i class="fa fa-triangle-exclamation"></i>
            <span id="loginErrorMsg">Invalid credentials. Please try again.</span>
          </div>

          <button type="submit" class="admin-btn admin-btn-primary login-btn" id="loginBtn">
            <i class="fa fa-right-to-bracket"></i> Login to Admin Panel
          </button>
        </form>
      </div>

      <p class="login-footer-note">
        <i class="fa fa-lock"></i> Secured by Firebase Auth — SwiftGlobal Logistics
        &copy; <span id="year"></span>
      </p>
    </div>

    <script type="module">
    import { adminLogin, onAuthReady } from './firebase.js';

    // If already logged in redirect immediately
    onAuthReady(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    // Password toggle
    document.getElementById('passToggle').addEventListener('click', () => {
      const inp = document.getElementById('adminPass');
      const ico = document.querySelector('#passToggle i');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      ico.className = inp.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('adminUser').value.trim();
      const password = document.getElementById('adminPass').value.trim();
      const errorBox = document.getElementById('loginError');
      const errorMsg = document.getElementById('loginErrorMsg');
      const btn      = document.getElementById('loginBtn');

      btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Verifying...';
      btn.disabled  = true;

      try {
        await adminLogin(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorBox.style.display = 'flex';
        errorMsg.textContent   = 'Invalid email or password. Please try again.';
        btn.innerHTML = '<i class="fa fa-right-to-bracket"></i> Login to Admin Panel';
        btn.disabled  = false;
        document.getElementById('adminPass').value = '';
      }
    });
  </script>
  </body>
</html>
