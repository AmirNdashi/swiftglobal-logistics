<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — SwiftGlobal Logistics</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar" style="position:relative;">
    <div class="container flex-between">
      <a href="index.html" class="nav-logo">
        <img src="images/logo.png" alt="SwiftGlobal Logo" class="logo-img" onerror="this.style.display='none'" />
        <span class="logo-text">Swift<span>Global</span></span>
      </a>
      <a href="index.html" class="btn btn-primary btn-sm">
        <i class="fa fa-house"></i> Back to Home
      </a>
    </div>
  </nav>

  <!-- 404 Content -->
  <main class="not-found-page" style="flex:1;">
    <div class="container">
      <div class="not-found-content animate-fadeInUp">
        <div class="not-found-number">404</div>
        <div class="not-found-icon"><i class="fa fa-box-open"></i></div>
        <h1>Page Not Found</h1>
        <p>Looks like this page got lost in transit! The page you're looking for doesn't exist or may have been moved.</p>
        <div class="not-found-actions">
          <a href="index.html" class="btn btn-primary btn-lg">
            <i class="fa fa-house"></i> Go Home
          </a>
          <a href="tracking.html" class="btn btn-dark btn-lg">
            <i class="fa fa-magnifying-glass"></i> Track a Parcel
          </a>
          <a href="contact.html" class="btn btn-outline btn-lg" style="color:var(--primary);border-color:var(--primary);">
            <i class="fa fa-headset"></i> Contact Support
          </a>
        </div>
        <div class="not-found-links">
          <p>Or visit one of these pages:</p>
          <div class="not-found-quick-links">
            <a href="about.html"><i class="fa fa-building"></i> About Us</a>
            <a href="services.html"><i class="fa fa-th-large"></i> Services</a>
            <a href="news.html"><i class="fa fa-newspaper"></i> News</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Simple Footer -->
  <footer style="background:var(--bg-dark);padding:20px 0;text-align:center;">
    <p style="color:rgba(255,255,255,0.4);font-size:0.85rem;margin:0;">
      &copy; <span id="year"></span> SwiftGlobal Logistics. All rights reserved.
    </p>
  </footer>

  <script src="js/main.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
